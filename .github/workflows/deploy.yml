name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate static Nuxt app
        run: npm run generate

      - name: Deploy static files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: ".output/public/"
          target: "~/public_html_deploy_tmp/"
          strip_components: 3

      - name: Swap deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Backup old files and replace with new ones
            rm -rf ~/public_html_old
            mv ~/public_html ~/public_html_old 2>/dev/null || true
            mv ~/public_html_deploy_tmp ~/public_html
            rm -rf ~/public_html_old
            echo "Deployment complete!"
